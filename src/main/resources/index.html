<html>
   <head>
      <title>tessting</title>
      <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
      <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
      <script src="scripts.js"></script>
   </head>
<script>
   $(document).ready(function () {
   userList();
   });
</script>  
  <body>
      <div class="row">
         <div class="col-sm-6">
            <table id="userTable"
               class="table table-bordered
               table-condensed table-striped">
               <thead>
                  <tr>
                     <th>Firstname</th>
                     <th>Lastname</th>
                      <th>Age</th>
                      <th>Delete</th>
                      <th>Update</th>
                      <th>CheckBox</th>
                  </tr>
               </thead>
            </table>
         </div>
      </div>
      <div class="row">
         <div class="col-sm-6">
            <div class="panel panel-primary">
               <div class="panel-heading">
                  User Information
               </div>
               <div class="panel-body">
               </div>
               <div class="panel-footer">
               </div>
            </div>
         </div>
      </div>
      <div class="form-group">
         <label for="firstname">Firstname</label>
         <input type="text" id="firstname" class="form-control"/>
      </div>
      <div class="form-group">
         <label for="lastname">Lastname</label>
         <input type="text" id="lastname" class="form-control"/>
      </div>
      <div class="form-group">
          <label for="age">age</label>
          <input type="text" id="age" min="0" max="100" class="form-control"/>
      </div>
      <div class="row">
         <div class="col-xs-12">
            <button type="button"
               id="updateButton"
               class="btn btn-primary"
               onclick="updateClick();">
            Add
            </button>
         </div>
      </div>
      <div class="row">
         <div class="col-xs-12">
            <button type="button"
               id="deleteAllButton"
               class="btn btn-primary"
               onclick="deleteAllClick();">
            Delete
            </button>
         </div>
      </div>
      <div class="row">
          <div class="col-xs-12">
              <button type="button"
                      id="updateLastNamesButton"
                      class="btn btn-primary"
                      onclick="updateLastNamesClick();">
                  Update last names
              </button>
          </div>
      </div>
      <div class="row">
          <div class="col-xs-12">
              <button type="button"
                      id="updateFirstNamesButton"
                      class="btn btn-primary"
                      onclick="updateFirstNamesClick();">
                  Update first names
              </button>
          </div>
      </div>
      <div class="row">
          <div class="col-xs-12">
              <button type="button"
                      id="updateAgeButton"
                      class="btn btn-primary"
                      onclick="updateAgeClick();">
                  Update age
              </button>
          </div>
      </div>
      <div class="row">
          <div class="col-xs-12">
              <button type="button"
                      id="deleteEvenButton"
                      class="btn btn-primary"
                      onclick="deleteEvenClick();">
                  Delete Even
              </button>
          </div>
      </div>
      <div class="row">
          <div class="col-xs-12">
              <button type="button"
                      id="deleteCheckButton"
                      class="btn btn-primary"
                      onclick="deleteChekClick();">
                  Delete Check
              </button>
          </div>
      </div>
   </body>
</html>
